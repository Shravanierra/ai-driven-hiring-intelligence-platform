<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="60%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Large document stack top-right -->
  <rect x="980" y="60" width="300" height="380" rx="18" fill="#c7d2fe" fill-opacity="0.5" transform="rotate(-6 1130 250)"/>
  <rect x="1000" y="50" width="300" height="380" rx="18" fill="#a5b4fc" fill-opacity="0.4" transform="rotate(-2 1150 240)"/>
  <rect x="1020" y="40" width="300" height="380" rx="18" fill="url(#card1)"/>
  <!-- Doc lines -->
  <line x1="1050" y1="100" x2="1290" y2="100" stroke="#6366f1" stroke-opacity="0.3" stroke-width="8" stroke-linecap="round"/>
  <line x1="1050" y1="130" x2="1240" y2="130" stroke="#6366f1" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round"/>
  <line x1="1050" y1="158" x2="1260" y2="158" stroke="#6366f1" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round"/>
  <line x1="1050" y1="186" x2="1200" y2="186" stroke="#6366f1" stroke-opacity="0.15" stroke-width="6" stroke-linecap="round"/>
  <line x1="1050" y1="214" x2="1250" y2="214" stroke="#6366f1" stroke-opacity="0.15" stroke-width="6" stroke-linecap="round"/>
  <!-- Checkmark on doc -->
  <circle cx="1270" cy="340" r="30" fill="#6366f1" fill-opacity="0.15"/>
  <path d="M1255 340 l10 12 l22-22" fill="none" stroke="#4f46e5" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Briefcase bottom-left -->
  <rect x="60" y="580" width="260" height="190" rx="20" fill="#818cf8" fill-opacity="0.15"/>
  <rect x="60" y="580" width="260" height="190" rx="20" fill="none" stroke="#6366f1" stroke-opacity="0.25" stroke-width="3"/>
  <rect x="130" y="555" width="120" height="40" rx="12" fill="#a5b4fc" fill-opacity="0.3"/>
  <rect x="130" y="555" width="120" height="40" rx="12" fill="none" stroke="#6366f1" stroke-opacity="0.2" stroke-width="2"/>
  <line x1="60" y1="660" x2="320" y2="660" stroke="#6366f1" stroke-opacity="0.2" stroke-width="3"/>
  <circle cx="190" cy="660" r="12" fill="#6366f1" fill-opacity="0.2"/>

  <!-- Skill tags -->
  <rect x="200" y="160" width="130" height="36" rx="18" fill="#6366f1" fill-opacity="0.12"/>
  <rect x="200" y="160" width="130" height="36" rx="18" fill="none" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="350" y="140" width="100" height="36" rx="18" fill="#818cf8" fill-opacity="0.15"/>
  <rect x="350" y="140" width="100" height="36" rx="18" fill="none" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1.5"/>
  <rect x="180" y="215" width="150" height="36" rx="18" fill="#a5b4fc" fill-opacity="0.2"/>
  <rect x="180" y="215" width="150" height="36" rx="18" fill="none" stroke="#a5b4fc" stroke-opacity="0.25" stroke-width="1.5"/>
  <rect x="345" y="195" width="110" height="36" rx="18" fill="#6366f1" fill-opacity="0.1"/>

  <!-- Dot grid top-left -->
  <g fill="#6366f1" fill-opacity="0.12">
    <circle cx="60" cy="60" r="4"/><circle cx="110" cy="60" r="4"/><circle cx="160" cy="60" r="4"/><circle cx="210" cy="60" r="4"/><circle cx="260" cy="60" r="4"/>
    <circle cx="60" cy="110" r="4"/><circle cx="110" cy="110" r="4"/><circle cx="160" cy="110" r="4"/><circle cx="210" cy="110" r="4"/><circle cx="260" cy="110" r="4"/>
    <circle cx="60" cy="160" r="4"/><circle cx="110" cy="160" r="4"/><circle cx="160" cy="160" r="4"/><circle cx="210" cy="160" r="4"/><circle cx="260" cy="160" r="4"/>
  </g>
  <!-- Dot grid bottom-right -->
  <g fill="#4f46e5" fill-opacity="0.1">
    <circle cx="1280" cy="760" r="4"/><circle cx="1330" cy="760" r="4"/><circle cx="1380" cy="760" r="4"/>
    <circle cx="1280" cy="810" r="4"/><circle cx="1330" cy="810" r="4"/><circle cx="1380" cy="810" r="4"/>
    <circle cx="1280" cy="860" r="4"/><circle cx="1330" cy="860" r="4"/><circle cx="1380" cy="860" r="4"/>
  </g>

  <!-- Floating circle accents -->
  <circle cx="700" cy="820" r="120" fill="#818cf8" fill-opacity="0.07"/>
  <circle cx="400" cy="450" r="80" fill="#6366f1" fill-opacity="0.05"/>
</svg>
