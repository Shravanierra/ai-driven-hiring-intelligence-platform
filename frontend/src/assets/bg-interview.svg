<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <!-- Clipboard outline -->
  <rect x="1050" y="80" width="220" height="300" rx="14" fill="none" stroke="#f97316" stroke-opacity="0.12" stroke-width="3"/>
  <rect x="1110" y="60" width="100" height="40" rx="10" fill="#fed7aa" fill-opacity="0.4"/>
  <line x1="1080" y1="150" x2="1250" y2="150" stroke="#f97316" stroke-opacity="0.1" stroke-width="5" stroke-linecap="round"/>
  <line x1="1080" y1="180" x2="1230" y2="180" stroke="#f97316" stroke-opacity="0.08" stroke-width="5" stroke-linecap="round"/>
  <line x1="1080" y1="210" x2="1240" y2="210" stroke="#f97316" stroke-opacity="0.08" stroke-width="5" stroke-linecap="round"/>
  <line x1="1080" y1="240" x2="1220" y2="240" stroke="#f97316" stroke-opacity="0.08" stroke-width="5" stroke-linecap="round"/>
  <!-- Question mark shapes -->
  <text x="150" y="350" font-family="Georgia, serif" font-size="180" fill="#f97316" fill-opacity="0.05" font-weight="bold">?</text>
  <text x="1250" y="750" font-family="Georgia, serif" font-size="120" fill="#fb923c" fill-opacity="0.06" font-weight="bold">?</text>
  <!-- Rubric rows -->
  <rect x="80" y="550" width="300" height="20" rx="4" fill="#fed7aa" fill-opacity="0.4"/>
  <rect x="80" y="580" width="260" height="20" rx="4" fill="#ffedd5" fill-opacity="0.5"/>
  <rect x="80" y="610" width="280" height="20" rx="4" fill="#fed7aa" fill-opacity="0.35"/>
  <!-- Star rating -->
  <polygon points="900,700 908,724 934,724 913,739 921,763 900,748 879,763 887,739 866,724 892,724" fill="#fbbf24" fill-opacity="0.15"/>
  <polygon points="960,700 968,724 994,724 973,739 981,763 960,748 939,763 947,739 926,724 952,724" fill="#fbbf24" fill-opacity="0.12"/>
  <polygon points="1020,700 1028,724 1054,724 1033,739 1041,763 1020,748 999,763 1007,739 986,724 1012,724" fill="#fbbf24" fill-opacity="0.1"/>
  <!-- Dots -->
  <g fill="#f97316" fill-opacity="0.05">
    <circle cx="1300" cy="750" r="4"/><circle cx="1350" cy="750" r="4"/><circle cx="1400" cy="750" r="4"/>
    <circle cx="1300" cy="800" r="4"/><circle cx="1350" cy="800" r="4"/><circle cx="1400" cy="800" r="4"/>
    <circle cx="50" cy="50" r="4"/><circle cx="100" cy="50" r="4"/><circle cx="150" cy="50" r="4"/>
    <circle cx="50" cy="100" r="4"/><circle cx="100" cy="100" r="4"/><circle cx="150" cy="100" r="4"/>
  </g>
</svg>
