  <circle cx="100" cy="208" r="18" fill="#4ade80" fill-opacity="0.4"/>
  <line x1="130" y1="200" x2="440" y2="200" stroke="#16a34a" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="218" x2="380" y2="218" stroke="#16a34a" stroke-opacity="0.15" stroke-width="5" stroke-linecap="round"/>
  <rect x="60" y="255" width="420" height="56" rx="12" fill="#dcfce7" fill-opacity="0.5"/>
