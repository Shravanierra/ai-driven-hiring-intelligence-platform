      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="60%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Podium bars -->
  <rect x="1020" y="460" width="110" height="240" rx="10" fill="#86efac" fill-opacity="0.5"/>
  <rect x="1145" y="380" width="110" height="320" rx="10" fill="#4ade80" fill-opacity="0.45"/>
  <rect x="895" y="520" width="110" height="180" rx="10" fill="#bbf7d0" fill-opacity="0.55"/>
