  <line x1="130" y1="275" x2="420" y2="275" stroke="#16a34a" stroke-opacity="0.18" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="293" x2="360" y2="293" stroke="#16a34a" stroke-opacity="0.12" stroke-width="5" stroke-linecap="round"/>
  <rect x="60" y="330" width="420" height="56" rx="12" fill="#f0fdf4" fill-opacity="0.6"/>
  <circle cx="100" cy="358" r="18" fill="#bbf7d0" fill-opacity="0.5"/>
  <line x1="130" y1="350" x2="400" y2="350" stroke="#16a34a" stroke-opacity="0.15" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="368" x2="340" y2="368" stroke="#16a34a" stroke-opacity="0.1" stroke-width="5" stroke-linecap="round"/>

