  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <!-- Podium / ranking shapes -->
  <rect x="1050" y="400" width="100" height="220" rx="8" fill="#86efac" fill-opacity="0.25"/>
  <rect x="1160" y="340" width="100" height="280" rx="8" fill="#4ade80" fill-opacity="0.2"/>
